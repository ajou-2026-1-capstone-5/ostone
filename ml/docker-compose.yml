x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: airflow/Dockerfile
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${DB_USER:-init}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-init}
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN_ASYNC: postgresql+asyncpg://${DB_USER:-init}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-init}
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY:-ilPjQSBqt-pN_Ci6T-DDa5PQFIfEvGBdc-jiv0StvLk=}
    AIRFLOW__API__SECRET_KEY: ${AIRFLOW__API__SECRET_KEY:-init-airflow-api-secret-key}
    AIRFLOW__API__BASE_URL: http://airflow-apiserver:8080
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://airflow-apiserver:8080/execution/
    AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW__API_AUTH__JWT_SECRET:-init-airflow-jwt-secret-key}
    AIRFLOW__CORE__LOAD_EXAMPLES: "False"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "False"
    AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS: admin:admin,viewer:viewer
    AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_PASSWORDS_FILE: /opt/airflow/auth/simple_auth_manager_passwords.json.generated
    AIRFLOW_SIMPLE_ADMIN_PASSWORD: ${AIRFLOW_SIMPLE_ADMIN_PASSWORD:-admin}
    AIRFLOW_SIMPLE_VIEWER_PASSWORD: ${AIRFLOW_SIMPLE_VIEWER_PASSWORD:-viewer}
    AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/src/dags
    AIRFLOW__LOGGING__BASE_LOG_FOLDER: /opt/airflow/logs
    PIPELINE_BACKEND_BASE_URL: ${PIPELINE_BACKEND_BASE_URL:-http://backend:8080}
    PIPELINE_ARTIFACT_ROOT: ${PIPELINE_ARTIFACT_ROOT:-/opt/airflow/artifacts}
    PIPELINE_CALLBACK_ENABLED: ${PIPELINE_CALLBACK_ENABLED:-true}
    PIPELINE_CALLBACK_TIMEOUT_SECONDS: ${PIPELINE_CALLBACK_TIMEOUT_SECONDS:-10}
    AIRFLOW_WEBHOOK_SECRET: ${AIRFLOW_WEBHOOK_SECRET:?AIRFLOW_WEBHOOK_SECRET is required}
    STORAGE_S3_BUCKET: ${STORAGE_S3_BUCKET:-init-raw-files-local}
    STORAGE_S3_REGION: ${STORAGE_S3_REGION:-ap-northeast-2}
    STORAGE_S3_ENDPOINT: ${STORAGE_S3_ENDPOINT:-http://minio:9000}
    STORAGE_S3_ACCESS_KEY: ${STORAGE_S3_ACCESS_KEY:-minioadmin}
    STORAGE_S3_SECRET_KEY: ${STORAGE_S3_SECRET_KEY:-minioadmin}
    STORAGE_S3_PATH_STYLE: ${STORAGE_S3_PATH_STYLE:-true}
    # Set PIPELINE_LLM_BASE_URL, PIPELINE_LLM_API_KEY, and PIPELINE_LLM_MODEL for LLM-based
    # pipeline features such as boundary detection and intent naming. See .agent/specs/001.md.
    PIPELINE_LLM_BASE_URL: ${PIPELINE_LLM_BASE_URL:-}
    PIPELINE_LLM_API_KEY: ${PIPELINE_LLM_API_KEY:-}
    PIPELINE_LLM_MODEL: ${PIPELINE_LLM_MODEL:-}
    EMBEDDING_MODEL_NAME: ${EMBEDDING_MODEL_NAME:-BAAI/bge-m3}
    EMBEDDING_MAX_LENGTH: ${EMBEDDING_MAX_LENGTH:-1024}
    ML_EMBEDDING_RUNTIME: flag_embedding
    HF_HOME: ${HF_HOME:-/opt/airflow/.cache/huggingface}
    PIPELINE_TASK_TIMEOUT_MINUTES: ${PIPELINE_TASK_TIMEOUT_MINUTES:-90}
    PYTHONPATH: /opt/airflow/src
  volumes:
    - ./src:/opt/airflow/src
    - airflow_logs:/opt/airflow/logs
    - airflow_artifacts:/opt/airflow/artifacts
    - airflow_auth:/opt/airflow/auth
  user: "${AIRFLOW_UID:-50000}:0"
  networks:
    - init-network

services:
  airflow-init:
    <<: *airflow-common
    container_name: init-airflow-init
    entrypoint: [ "/opt/airflow/scripts/init-airflow.sh" ]
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy

  airflow-apiserver:
    <<: *airflow-common
    container_name: init-airflow-apiserver
    command: [ "airflow", "api-server" ]
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: [ "CMD", "curl", "--fail", "http://localhost:8080/api/v2/version" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  airflow-scheduler:
    <<: *airflow-common
    container_name: init-airflow-scheduler
    command: [ "airflow", "scheduler" ]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  airflow-dag-processor:
    <<: *airflow-common
    container_name: init-airflow-dag-processor
    command: [ "airflow", "dag-processor" ]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

volumes:
  airflow_logs:
  airflow_artifacts:
  airflow_auth:
