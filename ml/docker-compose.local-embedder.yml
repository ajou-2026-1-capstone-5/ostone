services:
  airflow-init:
    environment:
      ML_EMBEDDING_RUNTIME: local_http
      EMBEDDING_RUNTIME_BASE_URL: ${LOCAL_EMBEDDER_BASE_URL:-http://host.docker.internal:18090}
      EMBEDDING_RUNTIME_TIMEOUT_SECONDS: ${EMBEDDING_RUNTIME_TIMEOUT_SECONDS:-1800}
      PIPELINE_DAG_MAX_ACTIVE_RUNS: ${PIPELINE_DAG_MAX_ACTIVE_RUNS:-4}
      PIPELINE_DAG_MAX_ACTIVE_TASKS: ${PIPELINE_DAG_MAX_ACTIVE_TASKS:-1}
      PIPELINE_CLUSTERING_SELECTION_MAX_INPUTS: ${PIPELINE_CLUSTERING_SELECTION_MAX_INPUTS:-5000}
      AIRFLOW__CORE__PARALLELISM: ${AIRFLOW_CORE_PARALLELISM:-1}
      PIPELINE_KNN_K: ${PIPELINE_KNN_K:-12}
      OMP_NUM_THREADS: ${PIPELINE_NUM_THREADS:-4}
      OPENBLAS_NUM_THREADS: ${PIPELINE_NUM_THREADS:-4}
      MKL_NUM_THREADS: ${PIPELINE_NUM_THREADS:-4}
