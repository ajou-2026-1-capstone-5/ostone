name: CI

on:
  push:
    branches:
      - "feature/**"
      - "spec/**"
      - "fix/**"
      - "chore/**"
      - "docs/**"
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  paths-filter:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      ml: ${{ steps.filter.outputs.ml }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/ci.yml'
            frontend:
              - 'frontend/**'
              - '.github/workflows/ci.yml'
            ml:
              - 'ml/**'
              - '.github/workflows/ci.yml'

  spec-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate branch and check spec
        run: |
          BRANCH="${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}"

          if [[ "$BRANCH" == "main" ]]; then
            echo "✅ main branch — skip"
            exit 0
          fi

          if [[ "$BRANCH" =~ ^(chore|docs)/ ]]; then
            echo "✅ Branch pattern valid (no spec required): $BRANCH"
            exit 0
          fi

          if [[ "$BRANCH" =~ ^(feature|fix)/([0-9]+)- ]]; then
            ISSUE_NUM="${BASH_REMATCH[2]}"
          elif [[ "$BRANCH" =~ ^spec/([0-9]+)$ ]]; then
            ISSUE_NUM="${BASH_REMATCH[1]}"
          else
            echo "❌ Branch '$BRANCH' does not match allowed patterns"
            echo "Allowed: feature/{number}-{desc}, spec/{number}, fix/{number}-{desc}, chore/{desc}, docs/{desc}"
            exit 1
          fi

          SPEC_FILE=".agent/specs/${ISSUE_NUM}.md"
          if [[ ! -f "$SPEC_FILE" ]] || [[ ! -s "$SPEC_FILE" ]]; then
            echo "❌ Spec file missing or empty: $SPEC_FILE"
            echo "Required: .agent/specs/${ISSUE_NUM}.md"
            exit 1
          fi
          echo "✅ Spec file found: $SPEC_FILE"

  backend:
    needs: paths-filter
    if: ${{ github.event_name == 'workflow_dispatch' || needs.paths-filter.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Build Backend
        working-directory: ./backend
        run: ./gradlew build -x checkstyleMain -x checkstyleTest
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/testdb
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: postgres
          SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect
          SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
          SPRING_LIQUIBASE_ENABLED: "true"
          SPRING_JPA_HIBERNATE_DDL_AUTO: validate
  frontend:
    needs: paths-filter
    if: ${{ github.event_name == 'workflow_dispatch' || needs.paths-filter.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: "./frontend/pnpm-lock.yaml"

      - name: Install dependencies
        working-directory: ./frontend
        run: pnpm install

      - name: Run tests
        working-directory: ./frontend
        run: pnpm test

      - name: Build
        working-directory: ./frontend
        run: pnpm build

  ml:
    needs: paths-filter
    if: ${{ github.event_name == 'workflow_dispatch' || needs.paths-filter.outputs.ml == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dependencies
        working-directory: ./ml
        run: uv sync

      - name: Run tests
        working-directory: ./ml
        run: uv run pytest

  ci-gate:
    if: always()
    needs: [paths-filter, spec-check, backend, frontend, ml]
    runs-on: ubuntu-latest
    steps:
      - name: Check CI results
        run: |
          results=("${{ needs.paths-filter.result }}" "${{ needs.spec-check.result }}" "${{ needs.backend.result }}" "${{ needs.frontend.result }}" "${{ needs.ml.result }}")
          for r in "${results[@]}"; do
            if [[ "$r" == "failure" || "$r" == "cancelled" ]]; then
              echo "❌ Job failed or cancelled: $r"
              exit 1
            fi
          done
          echo "✅ All jobs passed or skipped"
