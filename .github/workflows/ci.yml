name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  TOOL_JAVA_VERSION: "21"
  TOOL_NODE_VERSION: "22.13.0"
  TOOL_PNPM_VERSION: "10.33.0"
  TOOL_PYTHON_VERSION_FILE: "ml/.python-version"
  TOOL_UV_VERSION: "0.11.19"

jobs:
  paths-filter:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      ml: ${{ steps.filter.outputs.ml }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'mise.toml'
              - '.github/workflows/ci.yml'
            frontend:
              - 'frontend/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'mise.toml'
              - '.github/workflows/ci.yml'
            ml:
              - 'ml/**'
              - 'mise.toml'
              - '.github/workflows/ci.yml'

  spec-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate branch and check spec
        run: |
          BRANCH="${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}"

          if [[ "$BRANCH" == "main" ]]; then
            echo "✅ main branch — skip"
            exit 0
          fi

          if [[ "$BRANCH" =~ ^(chore|docs)/[^/]+$ ]]; then
            echo "✅ Branch pattern valid (no spec required): $BRANCH"
            exit 0
          fi

          if [[ "$BRANCH" =~ ^(feature|fix)/([0-9][0-9._-]*)-[^/]+$ ]]; then
            ISSUE_NUM="${BASH_REMATCH[2]}"
          elif [[ "$BRANCH" =~ ^spec/([0-9][0-9._-]*)$ ]]; then
            ISSUE_NUM="${BASH_REMATCH[1]}"
          else
            echo "❌ Branch '$BRANCH' does not match allowed patterns"
            echo "Allowed: feature/{number}-{desc}, spec/{number}, fix/{number}-{desc}, chore/{desc}, docs/{desc}"
            exit 1
          fi

          SPEC_FILE=".agent/specs/${ISSUE_NUM}.md"
          if [[ ! -f "$SPEC_FILE" ]] || [[ ! -s "$SPEC_FILE" ]]; then
            echo "❌ Spec file missing or empty: $SPEC_FILE"
            echo "Required: .agent/specs/${ISSUE_NUM}.md"
            exit 1
          fi
          echo "✅ Spec file found: $SPEC_FILE"

  tool-version-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check tool version pin consistency
        run: |
          ruby <<'RUBY'
          require "json"
          require "yaml"

          mise_tools = File.read("mise.toml").scan(/^(\w+)\s*=\s*"([^"]+)"/).to_h
          root_package = JSON.parse(File.read("package.json"))
          frontend_package = JSON.parse(File.read("frontend/package.json"))
          python_version = File.read("ml/.python-version").strip
          ci_env = YAML.load_file(".github/workflows/ci.yml").fetch("env")
          prod_env = YAML.load_file(".github/workflows/prod-deploy.yml").fetch("env")

          expected = {
            "TOOL_JAVA_VERSION" => "21",
            "TOOL_NODE_VERSION" => "22.13.0",
            "TOOL_PNPM_VERSION" => "10.33.0",
            "TOOL_PYTHON_VERSION_FILE" => "ml/.python-version",
            "TOOL_UV_VERSION" => "0.11.19",
          }

          failures = []
          expected.each do |key, value|
            failures << ".github/workflows/ci.yml env #{key} must be #{value}" unless ci_env[key] == value
          end
          expected.slice("TOOL_JAVA_VERSION", "TOOL_NODE_VERSION", "TOOL_PNPM_VERSION").each do |key, value|
            failures << ".github/workflows/prod-deploy.yml env #{key} must be #{value}" unless prod_env[key] == value
          end
          failures << "mise.toml java must be temurin-21" unless mise_tools["java"] == "temurin-21"
          failures << "mise.toml node must be #{expected["TOOL_NODE_VERSION"]}" unless mise_tools["node"] == expected["TOOL_NODE_VERSION"]
          failures << "mise.toml pnpm must be #{expected["TOOL_PNPM_VERSION"]}" unless mise_tools["pnpm"] == expected["TOOL_PNPM_VERSION"]
          failures << "mise.toml python must match ml/.python-version" unless mise_tools["python"] == python_version
          failures << "mise.toml uv must be #{expected["TOOL_UV_VERSION"]}" unless mise_tools["uv"] == expected["TOOL_UV_VERSION"]
          failures << "root packageManager must match pnpm #{expected["TOOL_PNPM_VERSION"]}" unless root_package["packageManager"] == "pnpm@#{expected["TOOL_PNPM_VERSION"]}"
          failures << "frontend packageManager must match pnpm #{expected["TOOL_PNPM_VERSION"]}" unless frontend_package["packageManager"] == "pnpm@#{expected["TOOL_PNPM_VERSION"]}"

          if failures.any?
            puts failures.join("\n")
            exit 1
          end
          RUBY

  backend:
    needs: paths-filter
    if: ${{ github.event_name == 'workflow_dispatch' || needs.paths-filter.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        options: >-
          --health-cmd "pg_isready -U postgres -d testdb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.TOOL_JAVA_VERSION }}
          distribution: "temurin"

      - name: Install pgvector extension
        run: docker exec "${{ job.services.postgres.id }}" psql -U postgres -d testdb -c "CREATE EXTENSION IF NOT EXISTS vector;"

      - name: Build Backend
        working-directory: ./backend
        run: ./gradlew build -x checkstyleMain -x checkstyleTest
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/testdb
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: postgres
          SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect
          SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
          SPRING_LIQUIBASE_ENABLED: "true"
          SPRING_JPA_HIBERNATE_DDL_AUTO: validate
  frontend:
    needs: paths-filter
    if: ${{ github.event_name == 'workflow_dispatch' || needs.paths-filter.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.TOOL_PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.TOOL_NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: "./frontend/pnpm-lock.yaml"

      - name: Install dependencies
        working-directory: ./frontend
        run: pnpm install

      - name: Run tests
        working-directory: ./frontend
        run: pnpm test

      - name: Build
        working-directory: ./frontend
        run: pnpm build

  ml:
    needs: paths-filter
    if: ${{ github.event_name == 'workflow_dispatch' || needs.paths-filter.outputs.ml == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ${{ env.TOOL_PYTHON_VERSION_FILE }}

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.TOOL_UV_VERSION }}

      - name: Sync dependencies
        working-directory: ./ml
        run: uv sync

      - name: Run tests
        working-directory: ./ml
        run: uv run pytest

  backend-sonar:
    needs: paths-filter
    if: ${{ (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork != true) && needs.paths-filter.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.TOOL_JAVA_VERSION }}
          distribution: "temurin"

      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('backend/**/*.gradle*', 'backend/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Run backend SonarCloud analysis
        working-directory: ./backend
        run: ./gradlew test jacocoTestReport sonar --info ${{ github.event_name == 'pull_request' && '-Dsonar.qualitygate.wait=true -Dsonar.qualitygate.timeout=300' || '' }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  frontend-sonar:
    needs: paths-filter
    if: ${{ (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork != true) && needs.paths-filter.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.TOOL_JAVA_VERSION }}
          distribution: "temurin"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.TOOL_PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.TOOL_NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: "./frontend/pnpm-lock.yaml"

      - name: Install dependencies
        working-directory: ./frontend
        run: pnpm install --frozen-lockfile

      - name: Run tests with coverage
        working-directory: ./frontend
        run: pnpm test -- --coverage

      - name: Run frontend SonarCloud analysis
        uses: SonarSource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4 # v7 (SHA pinned per Oracle C1-1)
        with:
          projectBaseDir: frontend
          args: >
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
            ${{ github.event_name == 'pull_request' && '-Dsonar.qualitygate.wait=true -Dsonar.qualitygate.timeout=300' || '' }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_SCANNER_SKIP_JRE_PROVISIONING: "true"

  ml-sonar:
    needs: paths-filter
    if: ${{ (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork != true) && needs.paths-filter.outputs.ml == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.TOOL_JAVA_VERSION }}
          distribution: "temurin"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ${{ env.TOOL_PYTHON_VERSION_FILE }}

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.TOOL_UV_VERSION }}

      - name: Sync dependencies
        working-directory: ./ml
        run: uv sync

      - name: Run tests with coverage
        working-directory: ./ml
        run: uv run pytest --cov=src --cov-report=xml:coverage.xml

      - name: Run ML SonarCloud analysis
        uses: SonarSource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4 # v7 (SHA pinned per Oracle C1-1)
        with:
          projectBaseDir: ml
          args: >
            -Dsonar.python.coverage.reportPaths=coverage.xml
            ${{ github.event_name == 'pull_request' && '-Dsonar.qualitygate.wait=true -Dsonar.qualitygate.timeout=300' || '' }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_SCANNER_SKIP_JRE_PROVISIONING: "true"

  ci-gate:
    if: always()
    needs: [paths-filter, spec-check, tool-version-check, backend, frontend, ml, backend-sonar, frontend-sonar, ml-sonar]
    runs-on: ubuntu-latest
    steps:
      - name: Check CI results
        run: |
          results=(
            "${{ needs.paths-filter.result }}"
            "${{ needs.spec-check.result }}"
            "${{ needs.tool-version-check.result }}"
            "${{ needs.backend.result }}"
            "${{ needs.frontend.result }}"
            "${{ needs.ml.result }}"
            "${{ needs.backend-sonar.result }}"
            "${{ needs.frontend-sonar.result }}"
            "${{ needs.ml-sonar.result }}"
          )
          for r in "${results[@]}"; do
            if [[ "$r" == "failure" || "$r" == "cancelled" ]]; then
              echo "❌ Job failed or cancelled: $r"
              exit 1
            fi
          done
          echo "✅ All jobs passed or skipped"
