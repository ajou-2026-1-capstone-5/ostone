name: Production Deploy

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "ml/**"
      - "infra/terraform/**"
      - ".github/workflows/prod-deploy.yml"
  workflow_dispatch:

concurrency:
  group: production-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  paths-filter:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      airflow: ${{ steps.filter.outputs.airflow }}
      ml: ${{ steps.filter.outputs.ml }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590
        id: filter
        with:
          filters: |
            backend:
              - "backend/**"
              - "infra/terraform/**"
              - ".github/workflows/prod-deploy.yml"
            frontend:
              - "frontend/**"
              - "infra/terraform/**"
              - ".github/workflows/prod-deploy.yml"
            airflow:
              - "ml/airflow/**"
              - "ml/src/**"
              - "infra/terraform/**"
              - ".github/workflows/prod-deploy.yml"
            ml:
              - "ml/**"
              - "infra/terraform/**"
              - ".github/workflows/prod-deploy.yml"
  terraform:
    runs-on: ubuntu-latest
    environment: prod
    outputs:
      frontend_bucket_name: ${{ steps.tf_outputs.outputs.frontend_bucket_name }}
      cloudfront_distribution_id: ${{ steps.tf_outputs.outputs.cloudfront_distribution_id }}
      ecs_cluster_name: ${{ steps.tf_outputs.outputs.ecs_cluster_name }}
      backend_service_name: ${{ steps.tf_outputs.outputs.backend_service_name }}
      backend_task_definition_arn: ${{ steps.tf_outputs.outputs.backend_task_definition_arn }}
      airflow_init_task_definition_arn: ${{ steps.tf_outputs.outputs.airflow_init_task_definition_arn }}
      airflow_apiserver_service_name: ${{ steps.tf_outputs.outputs.airflow_apiserver_service_name }}
      airflow_scheduler_service_name: ${{ steps.tf_outputs.outputs.airflow_scheduler_service_name }}
      airflow_dag_processor_service_name: ${{ steps.tf_outputs.outputs.airflow_dag_processor_service_name }}
      private_subnet_ids: ${{ steps.tf_outputs.outputs.private_subnet_ids }}
      ecs_airflow_security_group_id: ${{ steps.tf_outputs.outputs.ecs_airflow_security_group_id }}
    env:
      TF_VAR_domain_name: ${{ vars.PROD_DOMAIN_NAME }}
      TF_VAR_route53_zone_id: ${{ vars.PROD_ROUTE53_ZONE_ID || '' }}
      TF_VAR_manage_route53_zone: ${{ vars.PROD_MANAGE_ROUTE53_ZONE || 'false' }}
      TF_VAR_admin_cidr: ${{ vars.PROD_ADMIN_CIDR }}
      TF_VAR_airflow_api_base_url: ${{ vars.PROD_AIRFLOW_API_BASE_URL || '' }}
      TF_VAR_airflow_api_allow_insecure_http: ${{ vars.PROD_AIRFLOW_API_ALLOW_INSECURE_HTTP || 'false' }}
      TF_VAR_gpu_instance_type: ${{ vars.PROD_GPU_INSTANCE_TYPE || 'g6.2xlarge' }}
      TF_VAR_gpu_asg_max_size: ${{ vars.PROD_GPU_ASG_MAX_SIZE || '1' }}
      TF_VAR_gpu_asg_desired_capacity: ${{ vars.PROD_GPU_ASG_DESIRED_CAPACITY || '0' }}
      TF_VAR_embedding_model_name: ${{ vars.PROD_EMBEDDING_MODEL_NAME || 'BAAI/bge-m3' }}
      TF_VAR_ml_runtime_profile: ${{ vars.PROD_ML_RUNTIME_PROFILE || 'balanced' }}
      TF_VAR_llm_model_name: ${{ vars.PROD_LLM_MODEL_NAME || 'Qwen/Qwen3-14B' }}
      TF_VAR_llm_model_path: ${{ vars.PROD_LLM_MODEL_PATH || '/models/model.gguf' }}
      TF_VAR_llm_service_desired_count: ${{ vars.PROD_LLM_SERVICE_DESIRED_COUNT || '0' }}
      TF_VAR_backend_desired_count: ${{ vars.PROD_BACKEND_DESIRED_COUNT || '0' }}
      TF_VAR_backend_autoscaling_min_capacity: ${{ vars.PROD_BACKEND_AUTOSCALING_MIN_CAPACITY || '0' }}
      TF_VAR_backend_autoscaling_max_capacity: ${{ vars.PROD_BACKEND_AUTOSCALING_MAX_CAPACITY || '3' }}
      TF_VAR_db_master_password: ${{ secrets.PROD_DB_MASTER_PASSWORD }}
      TF_VAR_app_db_password: ${{ secrets.PROD_APP_DB_PASSWORD }}
      TF_VAR_airflow_db_password: ${{ secrets.PROD_AIRFLOW_DB_PASSWORD }}
      TF_VAR_jwt_secret: ${{ secrets.PROD_JWT_SECRET }}
      TF_VAR_airflow_api_username: ${{ secrets.PROD_AIRFLOW_API_USERNAME }}
      TF_VAR_airflow_api_password: ${{ secrets.PROD_AIRFLOW_API_PASSWORD }}
      TF_VAR_airflow_webhook_secret: ${{ secrets.PROD_AIRFLOW_WEBHOOK_SECRET }}
      TF_VAR_airflow_fernet_key: ${{ secrets.PROD_AIRFLOW_FERNET_KEY }}
      TF_VAR_airflow_api_secret_key: ${{ secrets.PROD_AIRFLOW_API_SECRET_KEY }}
      TF_VAR_airflow_api_auth_jwt_secret: ${{ secrets.PROD_AIRFLOW_API_AUTH_JWT_SECRET }}
      TF_VAR_airflow_simple_admin_password: ${{ secrets.PROD_AIRFLOW_SIMPLE_ADMIN_PASSWORD }}
      TF_VAR_airflow_simple_viewer_password: ${{ secrets.PROD_AIRFLOW_SIMPLE_VIEWER_PASSWORD }}
      TF_VAR_llm_runtime_api_key: ${{ secrets.PROD_LLM_RUNTIME_API_KEY || '' }}
      TF_VAR_toss_secret_key: ${{ secrets.PROD_TOSS_SECRET_KEY }}
      TF_VAR_toss_webhook_secret: ${{ secrets.PROD_TOSS_WEBHOOK_SECRET }}
      TF_VAR_toss_billing_key_encryption_key: ${{ secrets.PROD_TOSS_BILLING_KEY_ENCRYPTION_KEY }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd
        with:
          terraform_version: 1.15.4
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a
        with:
          aws-region: ap-northeast-2
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}

      - name: Ensure Terraform Cloud Map permissions
        env:
          TERRAFORM_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
        run: |
          role_name="${TERRAFORM_ROLE_ARN##*/}"
          aws iam put-role-policy \
            --role-name "$role_name" \
            --policy-name ostone-terraform-servicediscovery \
            --policy-document file://infra/aws/github-actions-terraform-servicediscovery-policy.json

      - name: Terraform Init
        working-directory: infra/terraform
        run: |
          terraform init -backend-config=backend.hcl

      - name: Validate required Terraform variables
        shell: bash
        run: |
          required=(
            TF_VAR_domain_name
            TF_VAR_admin_cidr
            TF_VAR_db_master_password
            TF_VAR_app_db_password
            TF_VAR_airflow_db_password
            TF_VAR_jwt_secret
            TF_VAR_airflow_api_username
            TF_VAR_airflow_api_password
            TF_VAR_airflow_webhook_secret
            TF_VAR_airflow_fernet_key
            TF_VAR_airflow_api_secret_key
            TF_VAR_airflow_api_auth_jwt_secret
            TF_VAR_airflow_simple_admin_password
            TF_VAR_airflow_simple_viewer_password
            TF_VAR_toss_secret_key
            TF_VAR_toss_webhook_secret
            TF_VAR_toss_billing_key_encryption_key
          )
          for name in "${required[@]}"; do
            test -n "${!name:-}" || { echo "$name is required"; exit 1; }
          done

      - name: Terraform Apply
        working-directory: infra/terraform
        run: |
          terraform apply -auto-approve -lock-timeout=10m

      - name: Read Terraform outputs
        id: tf_outputs
        working-directory: infra/terraform
        run: |
          private_subnet_ids="$(terraform output -json private_subnet_ids | jq -r 'map(select(length > 0)) | join(",")')"
          ecs_airflow_security_group_id="$(terraform output -raw ecs_airflow_security_group_id)"
          test -n "$private_subnet_ids" || { echo "Terraform output private_subnet_ids is empty"; exit 1; }
          test -n "$ecs_airflow_security_group_id" || { echo "Terraform output ecs_airflow_security_group_id is empty"; exit 1; }
          {
            echo "frontend_bucket_name=$(terraform output -raw frontend_bucket_name)"
            echo "cloudfront_distribution_id=$(terraform output -raw cloudfront_distribution_id)"
            echo "ecs_cluster_name=$(terraform output -raw ecs_cluster_name)"
            echo "backend_service_name=$(terraform output -raw backend_service_name)"
            echo "backend_task_definition_arn=$(terraform output -raw backend_task_definition_arn)"
            echo "airflow_init_task_definition_arn=$(terraform output -raw airflow_init_task_definition_arn)"
            echo "airflow_apiserver_service_name=$(terraform output -raw airflow_apiserver_service_name)"
            echo "airflow_scheduler_service_name=$(terraform output -raw airflow_scheduler_service_name)"
            echo "airflow_dag_processor_service_name=$(terraform output -raw airflow_dag_processor_service_name)"
            echo "ecs_airflow_security_group_id=$ecs_airflow_security_group_id"
            echo "private_subnet_ids=$private_subnet_ids"
          } >> "$GITHUB_OUTPUT"

  backend:
    needs: [paths-filter, terraform]
    if: ${{ github.event_name == 'workflow_dispatch' || needs.paths-filter.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Build with Gradle
        run: |
          cd backend
          ./gradlew bootJar --no-daemon -x checkstyleMain -x checkstyleTest

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a
        with:
          aws-region: ap-northeast-2
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@fa648b43de3d4d023bcb3f89ed6940096949c419

      - name: Free runner disk before Docker build
        run: |
          df -h
          docker system prune -af || true
          docker builder prune -af || true
          if [ -n "${RUNNER_TEMP:-}" ]; then
            rm -rf "${RUNNER_TEMP:?}"/* || true
          fi
          df -h

      - name: Build, tag, and push image to ECR
        env:
          ECR_REPOSITORY: ostone/backend
          IMAGE_TAG: ${{ github.sha }}
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t "$ECR_REPOSITORY:$IMAGE_TAG" -f backend/Dockerfile.prod backend/
          docker tag "$ECR_REPOSITORY:$IMAGE_TAG" "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker tag "$ECR_REPOSITORY:$IMAGE_TAG" "$ECR_REGISTRY/$ECR_REPOSITORY:latest"
          docker push --all-tags "$ECR_REGISTRY/$ECR_REPOSITORY"
          docker image rm \
            "$ECR_REPOSITORY:$IMAGE_TAG" \
            "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" \
            "$ECR_REGISTRY/$ECR_REPOSITORY:latest" || true
          docker system prune -af || true

      - name: Deploy to Amazon ECS
        env:
          ECR_REPOSITORY: ostone/backend
          IMAGE_TAG: ${{ github.sha }}
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECS_CLUSTER: ${{ needs.terraform.outputs.ecs_cluster_name }}
          ECS_SERVICE: ${{ needs.terraform.outputs.backend_service_name }}
          ECS_TASK_DEFINITION: ${{ needs.terraform.outputs.backend_task_definition_arn }}
          BACKEND_AUTOSCALING_MAX_CAPACITY: ${{ vars.PROD_BACKEND_AUTOSCALING_MAX_CAPACITY || '3' }}
        run: |
          IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          BACKEND_RESOURCE_ID="service/$ECS_CLUSTER/$ECS_SERVICE"
          BACKEND_MAX_CAPACITY="$BACKEND_AUTOSCALING_MAX_CAPACITY"
          if ! [[ "$BACKEND_MAX_CAPACITY" =~ ^[0-9]+$ ]] || [ "$BACKEND_MAX_CAPACITY" -lt 1 ]; then
            BACKEND_MAX_CAPACITY=1
          fi

          print_ecs_diagnostics() {
            echo "::group::ECS service diagnostics"
            aws ecs describe-services \
              --cluster "$ECS_CLUSTER" \
              --services "$ECS_SERVICE" \
              --region ap-northeast-2 \
              --query 'services[0].{desiredCount:desiredCount,runningCount:runningCount,pendingCount:pendingCount,deployments:deployments[].{id:id,status:status,rolloutState:rolloutState,rolloutStateReason:rolloutStateReason,taskDefinition:taskDefinition,desiredCount:desiredCount,runningCount:runningCount,pendingCount:pendingCount,failedTasks:failedTasks},events:events[0:10].{createdAt:createdAt,message:message}}' \
              --output json || true
            echo "::endgroup::"

            echo "::group::Recent backend tasks"
            task_arns="$(aws ecs list-tasks \
              --cluster "$ECS_CLUSTER" \
              --service-name "$ECS_SERVICE" \
              --desired-status STOPPED \
              --max-results 10 \
              --region ap-northeast-2 \
              --query 'taskArns' \
              --output text || true)"
            if [ -n "$task_arns" ] && [ "$task_arns" != "None" ]; then
              read -r -a task_arn_array <<< "$task_arns"
              aws ecs describe-tasks \
                --cluster "$ECS_CLUSTER" \
                --tasks "${task_arn_array[@]}" \
                --region ap-northeast-2 \
                --query 'tasks[].{taskArn:taskArn,lastStatus:lastStatus,stopCode:stopCode,stoppedReason:stoppedReason,stoppedAt:stoppedAt,containers:containers[].{name:name,lastStatus:lastStatus,exitCode:exitCode,reason:reason}}' \
                --output json || true
            else
              echo "No stopped tasks were returned for $ECS_SERVICE."
            fi
            echo "::endgroup::"

            LOG_GROUP="$(jq -r '.containerDefinitions[] | select(.name == "app-backend") | .logConfiguration.options["awslogs-group"] // empty' new-task-definition.json)"
            if [ -n "$LOG_GROUP" ]; then
              echo "::group::Recent backend logs"
              start_time="$(($(date +%s%3N) - 600000))"
              aws logs filter-log-events \
                --log-group-name "$LOG_GROUP" \
                --start-time "$start_time" \
                --limit 80 \
                --region ap-northeast-2 \
                --query 'events[].message' \
                --output text | tail -c 20000 || true
              echo "::endgroup::"
            fi
          }

          aws application-autoscaling register-scalable-target \
            --service-namespace ecs \
            --resource-id "$BACKEND_RESOURCE_ID" \
            --scalable-dimension ecs:service:DesiredCount \
            --min-capacity 1 \
            --max-capacity "$BACKEND_MAX_CAPACITY" \
            --region ap-northeast-2

          # Terraform이 이번 apply에서 등록한 backend task definition을 기준으로 이미지만 교체한다.
          # 서비스의 현재 task definition을 읽으면 aws_ecs_service.backend의
          # ignore_changes=[task_definition] 때문에 Terraform이 새로 추가한 env/secret(TOSS_* 등)이
          # 반영되지 않아 컨테이너가 빈 값으로 부팅하다 실패한다.
          aws ecs describe-task-definition \
            --task-definition "$ECS_TASK_DEFINITION" \
            --region ap-northeast-2 \
            --query 'taskDefinition' > task-definition.json
          jq --arg image "$IMAGE_URI" '
            .containerDefinitions |= map(
              if .name == "app-backend" then .image = $image else . end
            )
            | del(
              .taskDefinitionArn,
              .revision,
              .status,
              .requiresAttributes,
              .compatibilities,
              .registeredAt,
              .registeredBy
            )
          ' task-definition.json > new-task-definition.json
          NEW_TASK_DEF_ARN="$(aws ecs register-task-definition \
            --cli-input-json file://new-task-definition.json \
            --region ap-northeast-2 \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)"
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE" \
            --task-definition "$NEW_TASK_DEF_ARN" \
            --desired-count 1 \
            --force-new-deployment \
            --region ap-northeast-2
          if ! aws ecs wait services-stable \
              --cluster "$ECS_CLUSTER" \
              --services "$ECS_SERVICE" \
              --region ap-northeast-2; then
            print_ecs_diagnostics
            exit 1
          fi

  frontend:
    needs: [paths-filter, terraform]
    if: ${{ github.event_name == 'workflow_dispatch' || needs.paths-filter.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1
        with:
          version: 10

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install & Build
        env:
          VITE_API_BASE_URL: ${{ vars.PROD_API_BASE_URL }}
          VITE_WS_URL: ${{ vars.PROD_WS_URL }}
          VITE_TOSS_CLIENT_KEY: ${{ vars.PROD_TOSS_CLIENT_KEY }}
        run: |
          test -n "$VITE_API_BASE_URL"
          test -n "$VITE_WS_URL"
          test -n "$VITE_TOSS_CLIENT_KEY"
          cd frontend
          pnpm install --frozen-lockfile
          pnpm build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a
        with:
          aws-region: ap-northeast-2
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}

      - name: Sync to S3
        env:
          FRONTEND_BUCKET: ${{ needs.terraform.outputs.frontend_bucket_name }}
        run: |
          aws s3 sync frontend/dist/ "s3://$FRONTEND_BUCKET/" --delete

      - name: Invalidate CloudFront
        env:
          CLOUDFRONT_DISTRIBUTION_ID: ${{ needs.terraform.outputs.cloudfront_distribution_id }}
        run: |
          aws cloudfront create-invalidation --distribution-id "$CLOUDFRONT_DISTRIBUTION_ID" --paths "/*"

  ml:
    needs: [paths-filter, terraform]
    if: ${{ github.event_name == 'workflow_dispatch' || needs.paths-filter.outputs.ml == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a
        with:
          aws-region: ap-northeast-2
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@fa648b43de3d4d023bcb3f89ed6940096949c419

      - name: Free runner disk before Docker build
        run: |
          df -h
          docker system prune -af || true
          docker builder prune -af || true
          if [ -n "${RUNNER_TEMP:-}" ]; then
            rm -rf "${RUNNER_TEMP:?}"/* || true
          fi
          df -h

      - name: Build, tag, and push ML stage CPU image to ECR
        env:
          ECR_REPOSITORY: ostone/ml-stage-cpu
          IMAGE_TAG: ${{ github.sha }}
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t "$ECR_REPOSITORY:$IMAGE_TAG" -f ml/Dockerfile.cpu .
          docker tag "$ECR_REPOSITORY:$IMAGE_TAG" "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker tag "$ECR_REPOSITORY:$IMAGE_TAG" "$ECR_REGISTRY/$ECR_REPOSITORY:latest"
          docker push --all-tags "$ECR_REGISTRY/$ECR_REPOSITORY"
          docker image rm \
            "$ECR_REPOSITORY:$IMAGE_TAG" \
            "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" \
            "$ECR_REGISTRY/$ECR_REPOSITORY:latest" || true
          docker system prune -af || true

      - name: Build, tag, and push ML stage GPU image to ECR
        env:
          ECR_REPOSITORY: ostone/ml-stage-gpu
          IMAGE_TAG: ${{ github.sha }}
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t "$ECR_REPOSITORY:$IMAGE_TAG" -f ml/Dockerfile.gpu .
          docker tag "$ECR_REPOSITORY:$IMAGE_TAG" "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker tag "$ECR_REPOSITORY:$IMAGE_TAG" "$ECR_REGISTRY/$ECR_REPOSITORY:latest"
          docker push --all-tags "$ECR_REGISTRY/$ECR_REPOSITORY"
          docker image rm \
            "$ECR_REPOSITORY:$IMAGE_TAG" \
            "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" \
            "$ECR_REGISTRY/$ECR_REPOSITORY:latest" || true
          docker system prune -af || true

  airflow:
    needs: [paths-filter, terraform, ml]
    if: ${{ always() && (github.event_name == 'workflow_dispatch' || needs.paths-filter.outputs.airflow == 'true' || needs.paths-filter.outputs.ml == 'true') && needs.terraform.result == 'success' && (needs.ml.result == 'success' || needs.ml.result == 'skipped') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a
        with:
          aws-region: ap-northeast-2
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@fa648b43de3d4d023bcb3f89ed6940096949c419

      - name: Free runner disk before Docker build
        run: |
          df -h
          docker system prune -af || true
          docker builder prune -af || true
          if [ -n "${RUNNER_TEMP:-}" ]; then
            rm -rf "${RUNNER_TEMP:?}"/* || true
          fi
          df -h

      - name: Build, tag, and push Airflow image to ECR
        env:
          ECR_REPOSITORY: ostone/airflow
          IMAGE_TAG: ${{ github.sha }}
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t "$ECR_REPOSITORY:$IMAGE_TAG" -f ml/airflow/Dockerfile ml
          docker tag "$ECR_REPOSITORY:$IMAGE_TAG" "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker tag "$ECR_REPOSITORY:$IMAGE_TAG" "$ECR_REGISTRY/$ECR_REPOSITORY:latest"
          docker push --all-tags "$ECR_REGISTRY/$ECR_REPOSITORY"
          docker image rm \
            "$ECR_REPOSITORY:$IMAGE_TAG" \
            "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" \
            "$ECR_REGISTRY/$ECR_REPOSITORY:latest" || true
          docker system prune -af || true

      - name: Deploy Airflow services
        env:
          IMAGE_TAG: ${{ github.sha }}
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECS_CLUSTER: ${{ needs.terraform.outputs.ecs_cluster_name }}
          AIRFLOW_INIT_TASK_DEFINITION: ${{ needs.terraform.outputs.airflow_init_task_definition_arn }}
          AIRFLOW_API_SERVICE: ${{ needs.terraform.outputs.airflow_apiserver_service_name }}
          AIRFLOW_SCHEDULER_SERVICE: ${{ needs.terraform.outputs.airflow_scheduler_service_name }}
          AIRFLOW_DAG_PROCESSOR_SERVICE: ${{ needs.terraform.outputs.airflow_dag_processor_service_name }}
          PRIVATE_SUBNET_IDS: ${{ needs.terraform.outputs.private_subnet_ids }}
          AIRFLOW_SECURITY_GROUP_ID: ${{ needs.terraform.outputs.ecs_airflow_security_group_id }}
        run: |
          test -n "$PRIVATE_SUBNET_IDS" || { echo "PRIVATE_SUBNET_IDS is empty"; exit 1; }
          test -n "$AIRFLOW_SECURITY_GROUP_ID" || { echo "AIRFLOW_SECURITY_GROUP_ID is empty"; exit 1; }
          SUBNET_JSON="$(printf '%s\n' "$PRIVATE_SUBNET_IDS" \
            | jq -Re 'split(",") | map(gsub("^\\s+|\\s+$"; "")) | map(select(length > 0)) | select(length > 0)')"
          NETWORK_CONFIG="$(jq -cn \
            --argjson subnets "$SUBNET_JSON" \
            --arg sg "$AIRFLOW_SECURITY_GROUP_ID" \
            '{awsvpcConfiguration:{subnets:$subnets,securityGroups:[$sg],assignPublicIp:"DISABLED"}}')"

          INIT_TASK_ARN="$(aws ecs run-task \
            --cluster "$ECS_CLUSTER" \
            --task-definition "$AIRFLOW_INIT_TASK_DEFINITION" \
            --launch-type FARGATE \
            --platform-version LATEST \
            --network-configuration "$NETWORK_CONFIG" \
            --query 'tasks[0].taskArn' \
            --output text \
            --region ap-northeast-2)"
          test "$INIT_TASK_ARN" != "None"
          aws ecs wait tasks-stopped --cluster "$ECS_CLUSTER" --tasks "$INIT_TASK_ARN" --region ap-northeast-2
          EXIT_CODE="$(aws ecs describe-tasks \
            --cluster "$ECS_CLUSTER" \
            --tasks "$INIT_TASK_ARN" \
            --query 'tasks[0].containers[0].exitCode' \
            --output text \
            --region ap-northeast-2)"
          test "$EXIT_CODE" = "0"

          update_service_image() {
            local service="$1"
            local container="$2"
            local repository="ostone/airflow"
            local image_uri="$ECR_REGISTRY/$repository:$IMAGE_TAG"
            local task_def_arn
            task_def_arn="$(aws ecs describe-services \
              --cluster "$ECS_CLUSTER" \
              --services "$service" \
              --region ap-northeast-2 \
              --query 'services[0].taskDefinition' \
              --output text)"
            aws ecs describe-task-definition \
              --task-definition "$task_def_arn" \
              --region ap-northeast-2 \
              --query 'taskDefinition' > "task-definition-${service}.json"
            jq --arg image "$image_uri" --arg container "$container" '
              .containerDefinitions |= map(
                if .name == $container then .image = $image else . end
              )
              | del(
                .taskDefinitionArn,
                .revision,
                .status,
                .requiresAttributes,
                .compatibilities,
                .registeredAt,
                .registeredBy
              )
            ' "task-definition-${service}.json" > "new-task-definition-${service}.json"
            local new_task_def_arn
            new_task_def_arn="$(aws ecs register-task-definition \
              --cli-input-json "file://new-task-definition-${service}.json" \
              --region ap-northeast-2 \
              --query 'taskDefinition.taskDefinitionArn' \
              --output text)"
            aws ecs update-service \
              --cluster "$ECS_CLUSTER" \
              --service "$service" \
              --task-definition "$new_task_def_arn" \
              --force-new-deployment \
              --region ap-northeast-2
          }

          update_service_image "$AIRFLOW_API_SERVICE" "airflow-apiserver"
          update_service_image "$AIRFLOW_SCHEDULER_SERVICE" "airflow-scheduler"
          update_service_image "$AIRFLOW_DAG_PROCESSOR_SERVICE" "airflow-dag-processor"
          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER" \
            --services "$AIRFLOW_API_SERVICE" "$AIRFLOW_SCHEDULER_SERVICE" "$AIRFLOW_DAG_PROCESSOR_SERVICE" \
            --region ap-northeast-2
