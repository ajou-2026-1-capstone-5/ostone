name: Production Deploy

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "ml/**"
      - ".github/workflows/prod-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  paths-filter:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      gpu: ${{ steps.filter.outputs.gpu }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - "backend/**"
              - ".github/workflows/prod-deploy.yml"
            frontend:
              - "frontend/**"
              - ".github/workflows/prod-deploy.yml"
            gpu:
              - "ml/**"
              - ".github/workflows/prod-deploy.yml"

  backend:
    needs: paths-filter
    if: ${{ github.event_name == 'workflow_dispatch' || needs.paths-filter.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Build with Gradle
        run: |
          cd backend
          ./gradlew bootJar --no-daemon -x checkstyleMain -x checkstyleTest

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ap-northeast-2
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        env:
          ECR_REPOSITORY: ostone/backend
          IMAGE_TAG: ${{ github.sha }}
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t "$ECR_REPOSITORY:$IMAGE_TAG" -f backend/Dockerfile.prod backend/
          docker tag "$ECR_REPOSITORY:$IMAGE_TAG" "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker tag "$ECR_REPOSITORY:$IMAGE_TAG" "$ECR_REGISTRY/$ECR_REPOSITORY:latest"
          docker push --all-tags "$ECR_REGISTRY/$ECR_REPOSITORY"

      - name: Deploy to Amazon ECS
        env:
          ECR_REPOSITORY: ostone/backend
          IMAGE_TAG: ${{ github.sha }}
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          TASK_DEF_ARN="$(aws ecs describe-services \
            --cluster ostone-prod-cluster \
            --services ostone-backend \
            --region ap-northeast-2 \
            --query 'services[0].taskDefinition' \
            --output text)"
          aws ecs describe-task-definition \
            --task-definition "$TASK_DEF_ARN" \
            --region ap-northeast-2 \
            --query 'taskDefinition' > task-definition.json
          jq --arg image "$IMAGE_URI" '
            .containerDefinitions |= map(
              if .name == "app-backend" then .image = $image else . end
            )
            | del(
              .taskDefinitionArn,
              .revision,
              .status,
              .requiresAttributes,
              .compatibilities,
              .registeredAt,
              .registeredBy
            )
          ' task-definition.json > new-task-definition.json
          NEW_TASK_DEF_ARN="$(aws ecs register-task-definition \
            --cli-input-json file://new-task-definition.json \
            --region ap-northeast-2 \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)"
          aws ecs update-service \
            --cluster ostone-prod-cluster \
            --service ostone-backend \
            --task-definition "$NEW_TASK_DEF_ARN" \
            --force-new-deployment \
            --region ap-northeast-2

  frontend:
    needs: paths-filter
    if: ${{ github.event_name == 'workflow_dispatch' || needs.paths-filter.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install & Build
        env:
          VITE_API_BASE_URL: ${{ vars.PROD_API_BASE_URL }}
          VITE_WS_URL: ${{ vars.PROD_WS_URL }}
        run: |
          test -n "$VITE_API_BASE_URL"
          cd frontend
          pnpm install --frozen-lockfile
          pnpm build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ap-northeast-2
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}

      - name: Sync to S3
        env:
          FRONTEND_BUCKET: ${{ secrets.FRONTEND_S3_BUCKET }}
        run: |
          aws s3 sync frontend/dist/ "s3://$FRONTEND_BUCKET/" --delete

      - name: Invalidate CloudFront
        env:
          CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          aws cloudfront create-invalidation --distribution-id "$CLOUDFRONT_DISTRIBUTION_ID" --paths "/*"

  gpu:
    needs: paths-filter
    if: ${{ github.event_name == 'workflow_dispatch' || needs.paths-filter.outputs.gpu == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ap-northeast-2
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push GPU image to ECR
        env:
          ECR_REPOSITORY: ostone/ml-gpu
          IMAGE_TAG: ${{ github.sha }}
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t "$ECR_REPOSITORY:$IMAGE_TAG" -f ml/Dockerfile.gpu .
          docker tag "$ECR_REPOSITORY:$IMAGE_TAG" "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker tag "$ECR_REPOSITORY:$IMAGE_TAG" "$ECR_REGISTRY/$ECR_REPOSITORY:latest"
          docker push --all-tags "$ECR_REGISTRY/$ECR_REPOSITORY"
