name: Production Deploy

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "ml/**"
      - ".github/workflows/prod-deploy.yml"
  workflow_dispatch:

concurrency:
  group: prod-deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  paths-filter:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      ml_embedder: ${{ steps.filter.outputs.ml_embedder }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590
        id: filter
        with:
          filters: |
            backend:
              - "backend/**"
              - ".github/workflows/prod-deploy.yml"
            frontend:
              - "frontend/**"
              - ".github/workflows/prod-deploy.yml"
            ml_embedder:
              - "ml/**"
              - ".github/workflows/prod-deploy.yml"

  backend:
    needs: paths-filter
    if: ${{ github.event_name == 'workflow_dispatch' || needs.paths-filter.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Build with Gradle
        run: |
          cd backend
          ./gradlew bootJar --no-daemon -x checkstyleMain -x checkstyleTest

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a
        with:
          aws-region: ap-northeast-2
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@fa648b43de3d4d023bcb3f89ed6940096949c419

      - name: Build, tag, and push image to ECR
        env:
          ECR_REPOSITORY: ostone/backend
          IMAGE_TAG: ${{ github.sha }}
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t "$ECR_REPOSITORY:$IMAGE_TAG" -f backend/Dockerfile.prod backend/
          docker tag "$ECR_REPOSITORY:$IMAGE_TAG" "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker tag "$ECR_REPOSITORY:$IMAGE_TAG" "$ECR_REGISTRY/$ECR_REPOSITORY:latest"
          docker push --all-tags "$ECR_REGISTRY/$ECR_REPOSITORY"

      - name: Deploy to Amazon ECS
        env:
          ECR_REPOSITORY: ostone/backend
          IMAGE_TAG: ${{ github.sha }}
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          TASK_DEF_ARN="$(aws ecs describe-services \
            --cluster ostone-prod-cluster \
            --services ostone-backend \
            --region ap-northeast-2 \
            --query 'services[0].taskDefinition' \
            --output text)"
          aws ecs describe-task-definition \
            --task-definition "$TASK_DEF_ARN" \
            --region ap-northeast-2 \
            --query 'taskDefinition' > task-definition.json
          jq --arg image "$IMAGE_URI" '
            .containerDefinitions |= map(
              if .name == "app-backend" then .image = $image else . end
            )
            | del(
              .taskDefinitionArn,
              .revision,
              .status,
              .requiresAttributes,
              .compatibilities,
              .registeredAt,
              .registeredBy
            )
          ' task-definition.json > new-task-definition.json
          NEW_TASK_DEF_ARN="$(aws ecs register-task-definition \
            --cli-input-json file://new-task-definition.json \
            --region ap-northeast-2 \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)"
          aws ecs update-service \
            --cluster ostone-prod-cluster \
            --service ostone-backend \
            --task-definition "$NEW_TASK_DEF_ARN" \
            --desired-count 1 \
            --force-new-deployment \
            --region ap-northeast-2
          aws ecs wait services-stable \
            --cluster ostone-prod-cluster \
            --services ostone-backend \
            --region ap-northeast-2

  frontend:
    needs: paths-filter
    if: ${{ github.event_name == 'workflow_dispatch' || needs.paths-filter.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1
        with:
          version: 10

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install & Build
        env:
          VITE_API_BASE_URL: ${{ vars.PROD_API_BASE_URL }}
          VITE_WS_URL: ${{ vars.PROD_WS_URL }}
        run: |
          test -n "$VITE_API_BASE_URL"
          test -n "$VITE_WS_URL"
          cd frontend
          pnpm install --frozen-lockfile
          pnpm build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a
        with:
          aws-region: ap-northeast-2
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}

      - name: Sync to S3
        env:
          FRONTEND_BUCKET: ${{ secrets.FRONTEND_S3_BUCKET }}
        run: |
          aws s3 sync frontend/dist/ "s3://$FRONTEND_BUCKET/" --delete

      - name: Invalidate CloudFront
        env:
          CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          aws cloudfront create-invalidation --distribution-id "$CLOUDFRONT_DISTRIBUTION_ID" --paths "/*"

  ml-embedder:
    needs: paths-filter
    if: ${{ github.event_name == 'workflow_dispatch' || needs.paths-filter.outputs.ml_embedder == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a
        with:
          aws-region: ap-northeast-2
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@fa648b43de3d4d023bcb3f89ed6940096949c419

      - name: Build, tag, and push ML embedder image to ECR
        env:
          ECR_REPOSITORY: ostone/ml-embedder
          IMAGE_TAG: ${{ github.sha }}
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t "$ECR_REPOSITORY:$IMAGE_TAG" -f ml/Dockerfile.gpu .
          docker tag "$ECR_REPOSITORY:$IMAGE_TAG" "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker tag "$ECR_REPOSITORY:$IMAGE_TAG" "$ECR_REGISTRY/$ECR_REPOSITORY:latest"
          docker push --all-tags "$ECR_REGISTRY/$ECR_REPOSITORY"
