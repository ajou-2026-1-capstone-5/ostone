services:
  postgres:
    image: postgres:17
    container_name: init-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-init}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-init}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-init} -d ${DB_NAME:-init}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - init-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: init-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-init}
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-init}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILE:-local}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - init-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: init-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - init-network

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: init-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - init-network

volumes:
  postgres_data:
  minio_data:

networks:
  init-network:
    driver: bridge
