  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: init-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_started
    networks:
      - init-network

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: init-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - init-network

  airflow-init:
    <<: *airflow-common
    container_name: init-airflow-init
    entrypoint: [ "/opt/airflow/scripts/init-airflow.sh" ]
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
      postgres-reconcile:
        condition: service_completed_successfully

  airflow-apiserver:
    <<: *airflow-common
    container_name: init-airflow-apiserver
    command: [ "airflow", "api-server" ]
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: [ "CMD", "curl", "--fail", "http://localhost:8080/api/v2/version" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  airflow-scheduler:
    <<: *airflow-common
    container_name: init-airflow-scheduler
    command: [ "airflow", "scheduler" ]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  airflow-dag-processor:
    <<: *airflow-common
    container_name: init-airflow-dag-processor
    command: [ "airflow", "dag-processor" ]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  airflow-triggerer:
    <<: *airflow-common
    container_name: init-airflow-triggerer
    command: [ "airflow", "triggerer" ]
    restart: unless-stopped
    profiles:
      - triggerer
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

volumes:
  postgres_data:
  minio_data:
  airflow_logs:
  airflow_artifacts:
  airflow_auth:


networks:
  init-network:
    driver: bridge
