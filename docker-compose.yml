services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: init-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-init}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-init}
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-init} -d ${DB_NAME:-init}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - init-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: init-backend
    volumes:
      - ./backend/build/libs/app.jar:/app/app.jar
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-init}
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-init}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILE:-local}
      SPRING_JPA_SHOW_SQL: ${SPRING_JPA_SHOW_SQL:-false}
      SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL: ${SPRING_JPA_FORMAT_SQL:-false}
      STORAGE_S3_ENDPOINT: ${STORAGE_S3_ENDPOINT-http://minio:9000}
      STORAGE_S3_ACCESS_KEY: ${STORAGE_S3_ACCESS_KEY-minioadmin}
      STORAGE_S3_SECRET_KEY: ${STORAGE_S3_SECRET_KEY-minioadmin}
      STORAGE_S3_PATH_STYLE: ${STORAGE_S3_PATH_STYLE-true}
      STORAGE_S3_BUCKET: ${STORAGE_S3_BUCKET:-init-raw-files-dev}
      STORAGE_S3_REGION: ${STORAGE_S3_REGION:-ap-northeast-2}
      AWS_REGION: ${AWS_REGION:-ap-northeast-2}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_ACCESS_TOKEN_EXPIRATION: ${JWT_ACCESS_TOKEN_EXPIRATION:-43200000}
      JWT_REFRESH_TOKEN_EXPIRATION: ${JWT_REFRESH_TOKEN_EXPIRATION:-604800000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:5176,http://127.0.0.1:5173,http://127.0.0.1:5174,http://127.0.0.1:5175,http://127.0.0.1:5176}
      AIRFLOW_WEBHOOK_SECRET: ${AIRFLOW_WEBHOOK_SECRET:?AIRFLOW_WEBHOOK_SECRET is required}
      AIRFLOW_API_BASE_URL: ${AIRFLOW_API_BASE_URL:-http://airflow-apiserver:8080}
      AIRFLOW_API_USERNAME: ${AIRFLOW_API_USERNAME:-admin}
      AIRFLOW_API_PASSWORD: ${AIRFLOW_API_PASSWORD:-admin}
      AIRFLOW_API_CONNECT_TIMEOUT: ${AIRFLOW_API_CONNECT_TIMEOUT:-3s}
      AIRFLOW_API_READ_TIMEOUT: ${AIRFLOW_API_READ_TIMEOUT:-10s}
      AIRFLOW_DOMAIN_PACK_GENERATION_DAG_ID: ${AIRFLOW_DOMAIN_PACK_GENERATION_DAG_ID:-domain_pack_generation}
      AI_CHAT_PROVIDER:
      AI_API_KEY: ${AI_API_KEY:-${OPENAI_API_KEY:-}}
      AI_BASE_URL: ${AI_BASE_URL:-https://api.openai.com}
      AI_CHAT_MODEL: ${AI_CHAT_MODEL:-gpt-4o-mini}
      AI_CHAT_TEMPERATURE: ${AI_CHAT_TEMPERATURE:-0.7}
      AI_EMBEDDING_PROVIDER: ${AI_EMBEDDING_PROVIDER:-bedrock}
      AI_EMBEDDING_ENABLED: ${AI_EMBEDDING_ENABLED:-false}
      AI_EMBEDDING_MODEL: ${AI_EMBEDDING_MODEL:-cohere.embed-multilingual-v3}
      AI_EMBEDDING_BEDROCK_REGION: ${AI_EMBEDDING_BEDROCK_REGION:-ap-northeast-1}
      AI_EMBEDDING_TIMEOUT_SECONDS: ${AI_EMBEDDING_TIMEOUT_SECONDS:-5}
      AI_EMBEDDING_PROFILE_BUILD_RUNNING_TIMEOUT: ${AI_EMBEDDING_PROFILE_BUILD_RUNNING_TIMEOUT:-15m}
      AI_EMBEDDING_AUTO_RUN_REPLAY_FITNESS_THRESHOLD: ${AI_EMBEDDING_AUTO_RUN_REPLAY_FITNESS_THRESHOLD:-0.70}
      AI_EMBEDDING_CONFIDENT_THRESHOLD: ${AI_EMBEDDING_CONFIDENT_THRESHOLD:-0.72}
      AI_EMBEDDING_AMBIGUOUS_THRESHOLD: ${AI_EMBEDDING_AMBIGUOUS_THRESHOLD:-0.55}
      AI_EMBEDDING_CONFIDENT_MARGIN: ${AI_EMBEDDING_CONFIDENT_MARGIN:-0.10}
      AI_EMBEDDING_SEMANTIC_FLOOR: ${AI_EMBEDDING_SEMANTIC_FLOOR:-0.65}
      AI_EMBEDDING_ROUTE_EVIDENCE_FLOOR: ${AI_EMBEDDING_ROUTE_EVIDENCE_FLOOR:-0.50}
      AI_EMBEDDING_LEXICAL_EVIDENCE_FLOOR: ${AI_EMBEDDING_LEXICAL_EVIDENCE_FLOOR:-0.30}

    ports:
      - "${BACKEND_HOST_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - init-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: init-frontend
    ports:
      - "${FRONTEND_HOST_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_BASE_URL: ${COMPOSE_VITE_API_BASE_URL:-http://localhost:8080/api/v1}
      VITE_API_PROXY_TARGET: ${COMPOSE_VITE_API_PROXY_TARGET:-http://backend:8080}
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - init-network

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: init-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - init-network

volumes:
  postgres_data:
  minio_data:


include:
  - ./ml/docker-compose.yml

networks:
  init-network:
    driver: bridge
