x-airflow-common: &airflow-common
  build:
    context: ./ml/airflow
    dockerfile: Dockerfile
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER:-airflow}:${AIRFLOW_DB_PASSWORD:?AIRFLOW_DB_PASSWORD is required}@postgres:5432/${AIRFLOW_DB_NAME:-airflow}
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN_ASYNC: postgresql+asyncpg://${AIRFLOW_DB_USER:-airflow}:${AIRFLOW_DB_PASSWORD:?AIRFLOW_DB_PASSWORD is required}@postgres:5432/${AIRFLOW_DB_NAME:-airflow}
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY:?AIRFLOW__CORE__FERNET_KEY is required}
    AIRFLOW__API__SECRET_KEY: ${AIRFLOW__API__SECRET_KEY:?AIRFLOW__API__SECRET_KEY is required}
    AIRFLOW__API__BASE_URL: http://airflow-apiserver:8080
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://airflow-apiserver:8080/execution/
    AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW__API_AUTH__JWT_SECRET:?AIRFLOW__API_AUTH__JWT_SECRET is required}
    AIRFLOW__CORE__LOAD_EXAMPLES: "False"
    AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS: admin:admin,viewer:viewer
    AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_PASSWORDS_FILE: /opt/airflow/auth/simple_auth_manager_passwords.json.generated
    AIRFLOW_SIMPLE_ADMIN_PASSWORD: ${AIRFLOW_SIMPLE_ADMIN_PASSWORD:?AIRFLOW_SIMPLE_ADMIN_PASSWORD is required}
    AIRFLOW_SIMPLE_VIEWER_PASSWORD: ${AIRFLOW_SIMPLE_VIEWER_PASSWORD:?AIRFLOW_SIMPLE_VIEWER_PASSWORD is required}
    AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
    AIRFLOW__LOGGING__BASE_LOG_FOLDER: /opt/airflow/logs
    PIPELINE_BACKEND_BASE_URL: ${PIPELINE_BACKEND_BASE_URL:-http://backend:8080}
    PIPELINE_ARTIFACT_ROOT: ${PIPELINE_ARTIFACT_ROOT:-/opt/airflow/artifacts}
    PYTHONPATH: /opt/airflow/src
  volumes:
    - ./ml/dags:/opt/airflow/dags
    - ./ml/src:/opt/airflow/src
    - airflow_logs:/opt/airflow/logs
    - airflow_artifacts:/opt/airflow/artifacts
    - airflow_auth:/opt/airflow/auth
  user: "${AIRFLOW_UID:-50000}:0"
  networks:
    - init-network

services:
  postgres:
    image: postgres:17
    container_name: init-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-init}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: ${DB_NAME:-init}
      AIRFLOW_DB_USER: ${AIRFLOW_DB_USER:-airflow}
      AIRFLOW_DB_PASSWORD: ${AIRFLOW_DB_PASSWORD:?AIRFLOW_DB_PASSWORD is required}
      AIRFLOW_DB_NAME: ${AIRFLOW_DB_NAME:-airflow}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-init} -d ${DB_NAME:-init}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - init-network

  postgres-reconcile:
    image: postgres:17
    container_name: init-postgres-reconcile
    environment:
      POSTGRES_USER: ${DB_USER:-init}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: ${DB_NAME:-init}
      PGPASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      PGHOST: postgres
      AIRFLOW_DB_USER: ${AIRFLOW_DB_USER:-airflow}
      AIRFLOW_DB_PASSWORD: ${AIRFLOW_DB_PASSWORD:?AIRFLOW_DB_PASSWORD is required}
      AIRFLOW_DB_NAME: ${AIRFLOW_DB_NAME:-airflow}
    entrypoint: ["/bin/sh", "/scripts/10-create-airflow-db.sh"]
    volumes:
      - ./docker/postgres/initdb:/scripts:ro
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - init-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: init-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-init}
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-init}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILE:-local}
