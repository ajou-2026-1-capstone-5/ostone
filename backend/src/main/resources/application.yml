spring:
  application:
    name: init-backend
  datasource:
    url: jdbc:postgresql://localhost:5432/init
    username: ${DB_USERNAME:init}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.sql
    default-schema: public
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 55MB

storage:
  s3:
    bucket-name: ${STORAGE_S3_BUCKET:init-raw-files-dev}
    region: ${STORAGE_S3_REGION:ap-northeast-2}
    endpoint: ${STORAGE_S3_ENDPOINT:}
    access-key: ${STORAGE_S3_ACCESS_KEY:}
    secret-key: ${STORAGE_S3_SECRET_KEY:}
    path-style-access: ${STORAGE_S3_PATH_STYLE:false}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 1800000
  refresh-token-expiration: 604800000

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:5176}

airflow:
  webhook:
    secret: ${AIRFLOW_WEBHOOK_SECRET}
