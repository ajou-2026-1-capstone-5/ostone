# 개발/검증 배포용 Spring Boot 프로필
# 운영 프로덕션은 application-prod.yml과 AWS ECS task definition을 기준으로 설정

server:
  port: ${SERVER_PORT:10000}
  shutdown: graceful

spring:
  lifecycle:
    timeout-per-shutdown-phase: 20s
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/init}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS}
