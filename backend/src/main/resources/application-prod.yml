springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

spring:
  ai:
    model:
      chat: ${AI_CHAT_PROVIDER:bedrock-converse}
    bedrock:
      aws:
        region: ${AI_CHAT_BEDROCK_REGION:${AI_EMBEDDING_BEDROCK_REGION:ap-northeast-2}}
      converse:
        chat:
          options:
            model: ${AI_CHAT_BEDROCK_MODEL:global.anthropic.claude-sonnet-4-6}
            temperature: ${AI_CHAT_TEMPERATURE:0.7}

  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}?sslmode=require
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.sql

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: never
    include-stacktrace: never

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:1800000}
  refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:604800000}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS}

storage:
  s3:
    bucket-name: ${STORAGE_S3_BUCKET}
    region: ${STORAGE_S3_REGION:ap-northeast-2}
    endpoint: ${STORAGE_S3_ENDPOINT:}
    access-key: ${STORAGE_S3_ACCESS_KEY:}
    secret-key: ${STORAGE_S3_SECRET_KEY:}
    path-style-access: ${STORAGE_S3_PATH_STYLE:false}
    server-side-encryption-enabled: ${STORAGE_S3_SSE_ENABLED:true}

app:
  ai:
    embedding:
      provider: ${AI_EMBEDDING_PROVIDER:bedrock}
      enabled: ${AI_EMBEDDING_ENABLED:true}
      model: ${AI_EMBEDDING_MODEL:cohere.embed-v4:0}
      bedrock-region: ${AI_EMBEDDING_BEDROCK_REGION:ap-northeast-2}
      timeout: ${AI_EMBEDDING_TIMEOUT_SECONDS:5}s
      profile-build-interval: ${AI_EMBEDDING_PROFILE_BUILD_INTERVAL:30s}
      profile-build-running-timeout: ${AI_EMBEDDING_PROFILE_BUILD_RUNNING_TIMEOUT:15m}
      query-cache-ttl: ${AI_EMBEDDING_QUERY_CACHE_TTL:5m}
      top-k: ${AI_EMBEDDING_TOP_K:30}
      auto-run-replay-fitness-threshold: ${AI_EMBEDDING_AUTO_RUN_REPLAY_FITNESS_THRESHOLD:0.70}
      confident-threshold: ${AI_EMBEDDING_CONFIDENT_THRESHOLD:0.72}
      ambiguous-threshold: ${AI_EMBEDDING_AMBIGUOUS_THRESHOLD:0.55}
      confident-margin: ${AI_EMBEDDING_CONFIDENT_MARGIN:0.10}
      semantic-floor: ${AI_EMBEDDING_SEMANTIC_FLOOR:0.65}
      route-evidence-floor: ${AI_EMBEDDING_ROUTE_EVIDENCE_FLOOR:0.50}
      lexical-evidence-floor: ${AI_EMBEDDING_LEXICAL_EVIDENCE_FLOOR:0.30}

airflow:
  api:
    base-url: ${AIRFLOW_API_BASE_URL}
    username: ${AIRFLOW_API_USERNAME}
    password: ${AIRFLOW_API_PASSWORD}
    connect-timeout: ${AIRFLOW_API_CONNECT_TIMEOUT:3s}
    read-timeout: ${AIRFLOW_API_READ_TIMEOUT:10s}
    allow-insecure-http: ${AIRFLOW_API_ALLOW_INSECURE_HTTP:false}
  dags:
    domain-pack-generation:
      dag-id: ${AIRFLOW_DOMAIN_PACK_GENERATION_DAG_ID:domain_pack_generation}
    ingestion:
      dag-id: ${AIRFLOW_INGESTION_DAG_ID:ingestion}
  webhook:
    secret: ${AIRFLOW_WEBHOOK_SECRET}

cloud:
  aws:
    region:
      static: ${AWS_REGION:ap-northeast-2}
    secretsmanager:
      enabled: true

logging:
  level:
    root: INFO
    com.ostone: INFO
    org.hibernate.SQL: WARN
