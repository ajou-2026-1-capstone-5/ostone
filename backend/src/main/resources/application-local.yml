spring:
  ai:
    model:
      chat: ${AI_CHAT_PROVIDER:openai}
    openai:
      api-key: ${AI_API_KEY:${OPENAI_API_KEY:}}
      base-url: ${AI_BASE_URL:https://api.openai.com}
      chat:
        options:
          model: ${AI_CHAT_MODEL:gpt-4o-mini}
          temperature: ${AI_CHAT_TEMPERATURE:0.7}
  datasource:
    url: jdbc:postgresql://localhost:5432/init
    username: ${DB_USERNAME:init}
    password: ${DB_PASSWORD:init1234}
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  liquibase:
    enabled: true

server:
  port: 8080

logging:
  level:
    org.springframework.jdbc: DEBUG
    liquibase: DEBUG

jwt:
  access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:43200000}
  refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:604800000}

airflow:
  api:
    base-url: ${AIRFLOW_API_BASE_URL:http://127.0.0.1:8081}
    username: ${AIRFLOW_API_USERNAME:admin}
    password: ${AIRFLOW_API_PASSWORD:admin}
    connect-timeout: ${AIRFLOW_API_CONNECT_TIMEOUT:3s}
    read-timeout: ${AIRFLOW_API_READ_TIMEOUT:10s}
    allow-insecure-http: ${AIRFLOW_API_ALLOW_INSECURE_HTTP:true}
  dags:
    domain-pack-generation:
      dag-id: ${AIRFLOW_DOMAIN_PACK_GENERATION_DAG_ID:domain_pack_generation}
  webhook:
    secret: ${AIRFLOW_WEBHOOK_SECRET:local-airflow-webhook-secret}

app:
  ai:
    chat:
      fallback:
        enabled: ${AI_CHAT_FALLBACK_ENABLED:true}
