spring:
  datasource:
    # 1. H2 옵션 최적화: PostgreSQL 모드와 식별자 대소문자 설정을 맞춥니다.
    url: "jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;INIT=CREATE SCHEMA IF NOT EXISTS app\\;CREATE SCHEMA IF NOT EXISTS corpus\\;CREATE SCHEMA IF NOT EXISTS pack\\;CREATE SCHEMA IF NOT EXISTS review\\;CREATE SCHEMA IF NOT EXISTS pipeline\\;CREATE SCHEMA IF NOT EXISTS runtime"
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      # 2. 핵심 수정: ddl-auto를 반드시 설정해야 Liquibase 대신 Hibernate가 테이블을 만듭니다.
      ddl-auto: create-drop
    properties:
      hibernate:
        # 3. 중요: H2의 Postgres 모드에서는 PostgreSQLDialect를 써야 jsonb 타입을 Hibernate가 에러 없이 처리합니다.
        dialect: org.hibernate.dialect.PostgreSQLDialect
        show_sql: true
        format_sql: true
  
  # 4. Liquibase는 테스트 시에 비활성화 (main의 SQL 파일 충돌 방지)
  liquibase:
    enabled: false
  ai:
    openai:
      api-key: test-api-key
      chat:
        options:
          model: ${OPENAI_CHAT_MODEL:gpt-5.4-mini}
          temperature: 0.7

jwt:
  secret: test-secret-key-for-testing-purposes-only-min-32-bytes
  access-token-expiration: 1800000
  refresh-token-expiration: 604800000

cors:
  allowed-origins: "http://localhost:5173"

app:
  ai:
    chat:
      system-prompt: "당신은 고객상담 어시스턴트입니다.\n친절하고 정확하게 답변해주세요."

airflow:
  webhook:
    secret: test-airflow-webhook-secret

storage:
  s3:
    bucket-name: test-bucket
    region: us-east-1
    endpoint: ""
    access-key: ""
    secret-key: ""
    path-style-access: false
